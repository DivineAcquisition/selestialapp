# Supabase Local Development Configuration
# See: https://supabase.com/docs/guides/local-development

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returned from a view, table, or stored procedure.
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6.
ip_version = "IPv6"
# The maximum length in bytes of HTTP request headers.
max_header_length = 4096

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
# OpenAI API Key to use for Supabase AI in the Supabase Studio.
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324
# Uncomment to expose additional ports for testing user email flow.
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects.
site_url = "http://localhost:3000"
# List of additional URLs that are allowed as a redirect destination.
additional_redirect_urls = [
  "http://localhost:3000",
  "http://127.0.0.1:3000",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback"
]
# How long tokens are valid for, in seconds.
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow testing manual linking of accounts.
enable_manual_linking = false

[auth.email]
# Allow/disallow new user signups via email.
enable_signup = true
# If enabled, users need to confirm their email address before signing in.
double_confirm_changes = true
# If enabled, users will need to confirm any email change.
enable_confirmations = true
# Controls the minimum amount of time that must pass before sending another signup confirmation.
max_frequency = "1s"

[auth.email.template.invite]
subject = "You've been invited to Selestial"
content_path = "./supabase/templates/invite.html"

[auth.email.template.confirmation]
subject = "Confirm your Selestial account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Selestial password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Selestial Magic Link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm your Selestial email change"
content_path = "./supabase/templates/email_change.html"

[auth.sms]
# Allow/disallow new user signups via SMS.
enable_signup = false
enable_confirmations = false

# External OAuth providers
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = ""
url = ""
skip_nonce_check = false

[auth.external.apple]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""
url = ""

[auth.external.github]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""
url = ""

[edge_runtime]
enabled = true
# Configure one of the supported request policies: `oneshot`, `per_worker`.
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"

# Experimental features - removed deprecated options
